name: web-release

on:
  push:
    branches: [ quantumstrand ]
    paths:
      - 'qs-viewer/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@1d1121622333fef74a132203b0c2602c71a60393 # v4.2.2
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'qs-viewer/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./qs-viewer

      - name: Build
        run: npm run build
        working-directory: ./qs-viewer

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dee46217119b # v3.0.1
        with:
          # vite-plugin-singlefile puts everything into index.html in the dist folder
          path: ./qs-viewer/dist

  deploy:
    name: Deploy site to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db901509bb205f29f0017ef74bc05696996328 # v4.0.5
